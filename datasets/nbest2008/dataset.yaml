id: nbest2008
name: "N-Best 2008"
full_name: "N-Best 2008 (Broadcast News NL)"
description: >
  The N-Best 2008 evaluation campaign corpus for Dutch broadcast news ASR.
  Contains BN-NL (broadcast news, Netherlands accent) and BN-VL (Flemish accent)
  recordings with NIST focus conditions F0 (clean), F1 (spontaneous),
  F2 (telephone/interview). Produced by TNO, Radboud University, and the Dutch
  Language Institute (INL).
reference: "Van Leeuwen, D.A., Kessens, J., Sanders, E. & Van den Heuvel, H. (2008). Results of the N-Best 2008 Dutch Speech Recognition Evaluation. https://citeseerx.ist.psu.edu/document?repid=rep1&type=pdf&doi=32b10cb0f4cb99ba934f5be5066638a5ad9b19f2"
language: nl
