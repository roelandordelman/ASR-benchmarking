id: whisper_large_v3
name: "Whisper large-v3"
description: >
  OpenAI Whisper large-v3 via faster-whisper. Audio is pre-segmented using reference
  STM windows for corpora with partial annotation (e.g. N-Best 2008), with utterances
  separated by less than 5 seconds merged into single chunks (matching UT convention).
  Results are fully automated without manual CTM corrections.
hf_model_id: "openai/whisper-large-v3"
hf_model_revision: "main"
language: nl
type: whisper
config:
  library: faster-whisper
  compute_type: int8
  device: auto
  beam_size: 5
  vad_filter: true
  condition_on_previous_text: false
  word_timestamps: true
  language: nl
